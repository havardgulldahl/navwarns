name: Interpret NavWarns

on:
  workflow_run:
    workflows: ["Fetch NavWarns"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: interpret-navwarns
  cancel-in-progress: false

jobs:
  list_navwarns:
    runs-on: ubuntu-latest
    outputs:
      files: ${{ steps.collect.outputs.files }}
    steps:
      - uses: actions/checkout@v5

      - id: collect
        shell: bash
        run: |
          set -euo pipefail

          # Get all JSON files (if dirs are missing, don't fail)
          all_files=$(find current/navwarns current/prips -type f -name "*.json" 2>/dev/null || true)

          filtered_files=()

          while IFS= read -r file; do
            [ -z "$file" ] && continue

            # Skip no-op warnings that have no usable geometry/coordinates
            has_coords=$(jq -r '
              (.geometry != null)
              and (.geometry.coordinates? != null)
              and (
                if (.geometry.coordinates | type) == "array"
                then (.geometry.coordinates | length) > 0
                else false
                end
              )
            ' "$file")

            if [ "$has_coords" != "true" ]; then
              echo "Skipping no-geometry/no-coordinates: $file"
              continue
            fi

            if [ -f "current/navwarns.geojson" ]; then
              input_id=$(jq -r '.id' "$file")

              # Skip only if existing feature has same id+body and already classified
              match=$(jq -c --arg id "$input_id" --slurpfile current "$file" '
                .features[]
                | select(.id == $id)
                | select(.properties.body == $current[0].properties.body)
                | select(.properties.category != null and .properties.title != null)
                | {found: true}
              ' current/navwarns.geojson | head -n 1)

              if [ -z "$match" ]; then
                filtered_files+=("$file")
              else
                echo "Skipping already classified: $file (id: $input_id)"
              fi
            else
              filtered_files+=("$file")
            fi
          done <<< "$all_files"

          files=$(printf '%s\n' "${filtered_files[@]}" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          count=${#filtered_files[@]}

          if [ "$count" -eq 0 ]; then
            echo "No new files to process."
            echo "files=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Collected $count new navwarn files."
          echo "files=$files" >> "$GITHUB_OUTPUT"

  interpret_navwarns:
    needs: list_navwarns
    if: needs.list_navwarns.outputs.files != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        file: ${{ fromJSON(needs.list_navwarns.outputs.files) }}
      max-parallel: 2
    continue-on-error: true
    permissions:
      contents: read
      models: read

    steps:
      - uses: actions/checkout@v5

      - name: Random sleep to stagger API calls
        shell: bash
        run: |
          delay=$((RANDOM % 60 + 120)) # 120-180 seconds
          echo "Sleeping $delay seconds..."
          sleep "$delay"

      - name: Extract body from GeoJSON properties
        id: navwarn_body
        shell: bash
        run: |
          set -euo pipefail
          body=$(jq -r '.properties.body | gsub("\n"; " ")' "${{ matrix.file }}")
          echo "body=$body" >> "$GITHUB_OUTPUT"

      - name: Run AI inference
        id: inference
        continue-on-error: true
        uses: actions/ai-inference@v1
        with:
          model: gpt-5-chat
          prompt-file: classification.prompt.yml
          max-tokens: 1024
          input: |
            navwarn: |
              ${{ steps.navwarn_body.outputs.body }}

      - name: Build classified file (fallback to unclassified)
        id: build_classified
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          base=$(basename "${{ matrix.file }}")
          out="classified_${base}"
          resp="${{ steps.inference.outputs.response-file }}"

          if [ "${{ steps.inference.outcome }}" = "success" ] && [ -n "${resp:-}" ] && jq -e . "$resp" >/dev/null 2>&1; then
            jq --slurpfile r "$resp" '
              .properties = (.properties // {})
              | .properties.category = ($r[0].category // "unclassified")
              | .properties.title = ($r[0].title // null)
            ' "${{ matrix.file }}" > "$out"
          else
            jq '
              .properties = (.properties // {})
              | .properties.category = "unclassified"
              | .properties.title = null
            ' "${{ matrix.file }}" > "$out"
          fi

          echo "out_file=$out" >> "$GITHUB_OUTPUT"

      - name: Validate JSON we just created
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          f="${{ steps.build_classified.outputs.out_file }}"
          echo "Checking $f"
          jq empty "$f" || { echo "Invalid JSON in $f"; rm -f "$f"; exit 1; }

          # Safety: remove null/empty geometry outputs
          if jq -e '.geometry == null' "$f" >/dev/null; then
            echo "Deleting null-geometry file $f"
            rm -f "$f"
            exit 0
          fi

          if jq -e '.geometry.coordinates == null' "$f" >/dev/null; then
            echo "Deleting no-coordinate file $f"
            rm -f "$f"
            exit 0
          fi

          if [ "$(jq '.geometry.coordinates | length' "$f")" -eq 0 ]; then
            echo "Deleting empty-coordinate file $f"
            rm -f "$f"
            exit 0
          fi

      - name: Derive safe artifact name
        id: artifact_name
        if: always()
        shell: bash
        run: |
          filename=$(basename "${{ matrix.file }}")
          safe_name=$(echo "$filename" | sed 's/[^a-zA-Z0-9._-]/_/g')
          echo "safe_name=$safe_name" >> "$GITHUB_OUTPUT"

      - name: Upload classified file as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: classified-${{ steps.artifact_name.outputs.safe_name }}
          path: ${{ steps.build_classified.outputs.out_file }}
          if-no-files-found: ignore

  commit:
    runs-on: ubuntu-latest
    needs: [list_navwarns, interpret_navwarns]
    if: needs.list_navwarns.outputs.files != '[]' && always()
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Download all classified files
        uses: actions/download-artifact@v4
        with:
          path: current/enriched_navwarns
          merge-multiple: true
          if-no-artifact-found: warn

      - name: Fail if no classified files found
        shell: bash
        run: |
          set -euo pipefail
          echo "Looking for JSON files in current/enriched_navwarns"
          mapfile -t files < <(find current/enriched_navwarns -type f -name '*.json')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "❌ No JSON files found. Failing job."
            exit 1
          fi
          echo "✅ Found ${#files[@]} JSON files."

      - name: Merge all JSON into GeoJSON FeatureCollection
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(find current/enriched_navwarns -type f -name '*.json')

          if [ -f "current/navwarns.geojson" ]; then
            jq -s '
              map(if type == "object" and .type == "FeatureCollection" then .features else . end)
              | flatten
              | unique_by([.id, .properties.body])
              | { "type": "FeatureCollection", "features": . }
            ' current/navwarns.geojson "${files[@]}" > current/navwarns.geojson.tmp
            mv current/navwarns.geojson.tmp current/navwarns.geojson
          else
            jq -s '{ "type": "FeatureCollection", "features": . }' "${files[@]}" > current/navwarns.geojson
          fi

      - name: Rebuild current-year archive
        shell: bash
        run: |
          set -euo pipefail
          year=$(date -u +%Y)
          python scripts/build_archives.py "$year"

      - name: Commit merged collection
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          cp current/navwarns.geojson docs/navwarns.geojson || echo "Copy failed"

          git add docs/navwarns.geojson current/navwarns.geojson
          git add docs/archive*.geojson docs/manifest.json

          git commit -m "Update merged NavWarn FeatureCollection" || echo "No changes to commit"

          # Optional resilience if branch moved
          git pull --rebase --autostash || true
          git push