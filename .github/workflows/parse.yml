name: Interpret NavWarns

on:
  workflow_run:
    workflows: ["Fetch NavWarns"]
    types: [completed]
  workflow_dispatch:

jobs:
  list_navwarns:
    runs-on: ubuntu-latest
    outputs:
      files: ${{ steps.collect.outputs.files }}
    steps:
      - uses: actions/checkout@v5

      - id: collect
        run: |
          # Get all JSON files
          all_files=$(find current/navwarns current/prips -name "*.json")

          # Filter out files that already exist in navwarns.geojson with matching body and classification
          filtered_files=()
          while IFS= read -r file; do
            if [ -f "current/navwarns.geojson" ]; then
              input_id=$(jq -r '.id' "$file")
              
              # Check if this file already exists with complete classification
              match=$(jq -c --arg id "$input_id" --slurpfile current "$file" '
                .features[] | 
                select(.id == $id) | 
                select(.properties.body == $current[0].properties.body) |
                select(.properties.category != null and .properties.title != null) |
                {found: true}
              ' current/navwarns.geojson | head -n 1)
              
              if [ -z "$match" ]; then
                # No match found, include this file
                filtered_files+=("$file")
              else
                echo "Skipping already classified: $file (id: $input_id)"
              fi
            else
              # No navwarns.geojson exists, include all files
              filtered_files+=("$file")
            fi
          done <<< "$all_files"

          # Convert to JSON array
          files=$(printf '%s\n' "${filtered_files[@]}" | jq -R -s -c 'split("\n")[:-1]')
          count=${#filtered_files[@]}

          if [ $count -eq 0 ]; then
            echo "No new files to process."
            echo "files=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Collected $count new navwarn files (filtered from total)."
          {
            echo "files=$files"
          } >> "$GITHUB_OUTPUT"
          

  interpret_navwarns:
    needs: list_navwarns
    if: needs.list_navwarns.outputs.files != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        file: ${{ fromJSON(needs.list_navwarns.outputs.files) }}
      max-parallel: 2
    continue-on-error: true   # make each matrix job non-blocking
    permissions:
      contents: write
      models: read

    steps:
      - uses: actions/checkout@v5

      - name: Random sleep to stagger the pace of API calls
        run: |
          delay=$((RANDOM % 60 + 60)) # sleep 60-120 seconds
          echo "Sleeping $delay seconds..."
          sleep $delay

      - name: Extract body from GeoJSON properties and store in a variable
        id: navwarn_body
        run: |
          body=$(jq -r '.properties.body | gsub("\n"; " ")' "${{ matrix.file }}")
          echo "body=$body" >> "$GITHUB_OUTPUT"

      - name: Run AI inference
        id: inference
        uses: actions/ai-inference@v1
        with:
          model: gpt-5-chat
          prompt-file: classification.prompt.yml
          max-tokens: 1024
          input: |
            navwarn: |
              ${{ steps.navwarn_body.outputs.body }}


      - name: Join inferred coordinates with original GeoJSON
        run: |
          base=$(basename "${{ matrix.file }}")
          jq --slurpfile r "${{ steps.inference.outputs.response-file }}" '
            .properties = (.properties // {}) 
            | .properties.category = $r[0].category
            | .properties.title = $r[0].title
          ' "${{ matrix.file }}" > "classified_${base}"

      - name: Validate json we just created
        run: |
          base=$(basename "${{ matrix.file }}");
          f="classified_${base}";
          echo "Checking $f"
          jq empty "$f" || { echo "Invalid JSON in $f"; rm -v "$f"; exit 1; }
          # if length of geometry.coordinates is 0, delete
          if [ "$(jq '.geometry.coordinates | length' "$f")" -eq 0 ]; then
            echo "Deleting empty coordinate file $f"
            rm -v "$f"
          fi

      - name: Derive safe artifact name
        id: artifact_name
        run: |
          # Get just the base filename, no path
          filename=$(basename "${{ matrix.file }}")
          # Replace any remaining invalid characters with underscores
          safe_name=$(echo "$filename" | sed 's/[^a-zA-Z0-9._-]/_/g')
          echo "safe_name=$safe_name" >> $GITHUB_OUTPUT

      - name: Upload coordinate file as artifact
        uses: actions/upload-artifact@v4
        with:
          name: classified-${{ steps.artifact_name.outputs.safe_name }}
          path: classified_*.json

  commit:
    runs-on: ubuntu-latest
    needs: interpret_navwarns
    if: success() || failure()  # Run even if some matrix jobs failed
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Download all coordinate files
        uses: actions/download-artifact@v4
        with:
          path: current/enriched_navwarns
          merge-multiple: true

      - name: Merge all JSON coordinates into GeoJSON FeatureCollection
        run: |
          tree -h current/enriched_navwarns
          files=$(find current/enriched_navwarns -name '*.json')
          
          # If there's an existing navwarns.geojson, merge with it
          if [ -f "current/navwarns.geojson" ]; then
            # Extract existing features and combine with new ones, deduplicate by id
            jq -s 'map(if type == "object" and .type == "FeatureCollection" then .features else . end) | flatten | unique_by(.id) | { "type": "FeatureCollection", "features": . }' \
              current/navwarns.geojson $files > current/navwarns.geojson.tmp
            mv current/navwarns.geojson.tmp current/navwarns.geojson
          else
            # No existing file, just create new one
            jq -s '{ "type": "FeatureCollection", "features": . }' $files > current/navwarns.geojson
          fi

      - name: Fail if no coordinate files found
        run: |
          echo "Looking for JSON files in current/enriched_navwarns"
          files=$(find current/enriched_navwarns -name '*.json')
          if [ -z "$files" ]; then
            echo "❌ No JSON coordinate files found. Failing job."
            exit 1
          else
            echo "✅ Found $(echo "$files" | wc -l) JSON files."
          fi

      - name: Rebuild current-year archive
        run: |
          year=$(date -u +%Y)
          python scripts/build_archives.py "$year"

      - name: Commit merged collection
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cp current/navwarns.geojson docs/navwarns.geojson || echo "Copy failed"
          git add docs/navwarns.geojson current/navwarns.geojson
          git add docs/archive*.geojson docs/manifest.json
          git commit -m "Update merged NavWarn FeatureCollection" || echo "No changes"
          git push